# Render Blueprint: long_shot
# Deploy from GitHub: connect repo in Render dashboard, then use this file for one-click setup.
# See docs/deploy-render.md for custom domain and env var steps.
#
# Database: Use your existing PostgreSQL (e.g. long-shot-db). Do NOT add a databases block
# here—Render allows only one free-tier database per account. Set DATABASE_URL in the web
# service Environment to your existing database's Internal Connection String.

services:
  - type: web
    name: long-shot-web
    runtime: ruby
    plan: starter

    buildCommand: bundle install && bundle exec rails tailwindcss:build && bundle exec rails assets:precompile && bundle exec rails assets:clean
    startCommand: ./bin/rails db:prepare && ./bin/rails server

    healthCheckPath: /up

    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      # Use 1 worker to leave room for Solid Queue (supervisor, dispatcher, worker, scheduler).
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RAILS_MAX_THREADS
        value: "2"
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      # DATABASE_URL: set in Render dashboard (Environment) to your existing PostgreSQL
      # Internal Connection String. Do not add a databases block above—use the DB you already have.
      - key: DATABASE_URL
        sync: false
      # Add BALLDONTLIE_API_KEY in Render dashboard (Environment) for PGA API
      # For custom domain (e.g. subdomain longshot.jaredmelnyk.com): add APP_HOST in Environment
      # For password reset email: add SMTP_ADDRESS, SMTP_PORT (default 587), SMTP_USER_NAME, SMTP_PASSWORD (e.g. SendGrid API key)
